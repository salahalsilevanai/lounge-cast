<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>popup</title>
    <style>
      body {
        width: 348px;
        height: auto;
        background: #112240;
        border: 0px;
        padding: 0px;
        margin: 0px;
        font-family: "SF Pro Display", sans-serif;
      }
      .mainContainer {
        margin: 0px;
        margin-top: 10px;
        width: 348px;
        height: auto;
        background: linear-gradient(
          0deg,
          rgba(72, 192, 164, 0.5) 0%,
          rgba(17, 34, 64, 0.5) 66%
        );
        border: 0px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 0px;
      }
      .header {
        width: 318px;
        height: auto;
        border: 0px;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
      }
      .titleContainer {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      h1 {
        text-align: center;
        color: #48c0a4;
        font-size: 32px;
        margin: 0px;
        margin-top: -5px;
        padding: 0px;
      }
      .slogan {
        text-align: center;
        color: white;
        font-size: 12px;
        margin: 0px;
        padding: 0px;
      }
      .live {
        text-align: center;
        color: #49b4cd;
        font-size: 13px;
        margin: 0px;
        padding: 0px;
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        border: 1px solid #49b4cd;
        border-radius: 50px;
        height: 20px;
        width: 50px;
      }
      .dot {
        margin-right: 3px;
        font-size: 20px;
        text-align: center;
      }
      .dot {
        color: #49b4cd;
        animation: livePulse 1.5s infinite ease-in-out;
      }

      @keyframes livePulse {
        0%,
        100% {
          color: #3498b3; /* Dark green */
        }

        50% {
          color: #7fd7eb; /* Bright green */
        }
      }
      .logoContainer {
        height: 50px;
        width: 50px;

        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        border-radius: 9px;
      }

      img {
        border-radius: 50%;
        height: 100%;
        width: 100%;
      }

      .container {
        margin: 0px;
        width: 348px;
        height: auto;
        border: 0px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 0px;
      }
      /* CSS Variables */
      :root {
        --input-width: 320px;
        --input-font-size: 16px;
        --input-pad-x: 42px;
        --input-pad-y: 10px;
        --input-pad-x-right: 14px;
        --input-radius: 15px;
        --input-bg: #1a2a4a;
        --input-color: #fafafa;
        --input-placeholder: #a8b2d1;
        --input-border: none;
        --input-border-bottom: 1px solid #d1d5db;
        --input-focus-color: #3b82f6;
        --input-focus-ring: 2px;
        --input-icon-color: #fafcff;
      }

      /* Styles */
      .input-wrapper {
        position: relative;
        display: flex;
        width: var(--input-width);
      }

      .custom-input {
        width: 100%;
        font-family: inherit;
        font-size: var(--input-font-size);
        padding: var(--input-pad-y) var(--input-pad-x-right) var(--input-pad-y)
          var(--input-pad-x);
        border-radius: var(--input-radius);
        background: var(--input-bg);
        color: var(--input-color);
        border: var(--input-border);
        border-bottom: var(--input-border-bottom);
        outline: none;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .custom-input::placeholder {
        color: var(--input-placeholder);
      }

      .custom-input:focus {
        border-bottom-color: var(--input-focus-color);
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.35);
      }

      .icon-left {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--input-icon-color);
        pointer-events: none;
      }

      .subtitles {
        color: #fafafa;
        font-size: 14px;
        margin: 0px;
        margin-top: 10px;
        padding: 0px;
        /* Add these three lines to left-align within the flex container */
        width: var(
          --input-width
        ); /* Matches the exact width of your input boxes */
        text-align: left;
        margin-bottom: 4px; /* Optional: adds a little breathing room above the input */
      }

      .middleSection {
        margin: 10px;
        display: flex;
        flex-direction: row;
        justify-content: center;
        gap: 27px;
        align-items: center;
        width: 100%;
      }
      .join,
      .create {
        font-size: 20px;
        width: 105px;
        height: 70px;
        border-radius: 14px;
        border: none;
      }
      .create:hover,
      .join:hover,
      .change:hover,
      .leave:hover {
        cursor: pointer;
        opacity: 0.9;
      }
      .create {
        background-color: #48c0a4;
      }
      .join {
        color: #fafafa;
        background-color: #1a2a4a;
      }
      .accountSection {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 7px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.5);
        font-size: 16px;
        margin-bottom: 10px;
      }
      .line {
        width: 111px; /* Adjust width as needed (e.g., 200px, 50%) */
        height: 3px; /* This controls the thickness of the line */
        background-color: #fafafa; /* The color of your line */
        margin: 15px 0; /* Optional: adds spacing above and below the line */
      }

      .lineRight {
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 1) 0%,
          rgba(255, 255, 255, 0) 100%
        );
      }
      .lineLeft {
        background: linear-gradient(
          270deg,
          rgba(255, 255, 255, 1) 0%,
          rgba(255, 255, 255, 0) 100%
        );
      }
      .bottomSection {
        margin: 0px;
        width: 348px;
        height: auto;
        border: 0px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 0px;
        gap: 10px;
        margin-bottom: 5px;
      }
      .change,
      .leave {
        position: relative;
        font-size: 20px;
        width: 260px;
        height: 40px;
        border-radius: 15px;
        border: none;
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }
      .change {
        background-color: #49b4cd;

        color: #322107;
      }
      .leave {
        border: 2px solid;
        border-color: #e06d75;
        color: #e06d75;
        background-color: #1a2a4a;
      }
      .button-icon-left {
        position: absolute;
        left: 15px;
        font-size: 14px;
      }

      .footer {
        color: rgba(255, 255, 255, 0.8);

        margin: 0px;
        width: 348px;
        height: 20px;
        border: 0px;
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        padding: 0px;
        gap: 15px;
        margin-bottom: 5px;
      }
      .bold {
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="mainContainer">
      <div class="header">
        <div class="logoContainer">
          <img alt="logo" src="../assets/logo.jpeg" />
        </div>
        <div class="titleContainer">
          <h1>Lounge Cast</h1>
          <p class="slogan">Watch & Listen Together</p>
        </div>
        <div class="live">
          <div class="dot">•</div>
          <p id="status">LIVE</p>
        </div>
      </div>

      <div class="container">
        <p class="subtitles">Display Name</p>
        <div class="input-wrapper">
          <span class="icon-left">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#fafcff"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </span>
          <input
            class="custom-input"
            type="text"
            placeholder="optional - shown to the room"
            id="name"
          />
        </div>
        <p class="subtitles">Room ID</p>

        <div class="input-wrapper">
          <span class="icon-left">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#fafcff"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
              xmlns="http://www.w3.org/2000/svg"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
          </span>
          <input
            class="custom-input"
            type="text"
            placeholder="E.g. 4F2-Lounge"
            id="room"
          />
        </div>

        <div class="middleSection">
          <button class="join" id="join-btn">Join Room</button>
          <button class="create" id="create">Create Room</button>
        </div>
        <div class="accountSection">
          <div class="line lineLeft"></div>
          <div class="account">ACCOUNT</div>
          <div class="line lineRight"></div>
        </div>

        <div class="bottomSection">
          <button class="change" id="username-btn">
            <!-- put the pen icon aligned to the left -->

            <span class="button-icon-left">✏️</span>
            <span class="buttonText">Change Username</span>
          </button>
          <button class="leave" id="leave">
            <span class="button-icon-left">🏃‍♂️</span>
            <span>Leave Room</span>
          </button>
        </div>
        <div class="footer">
          <span>Connect as <span class="bold">Guest</span></span>
          <span>●</span>
          <span>Room Sync enabled</span>
        </div>
      </div>
      <script src="popup.js"></script>
    </div>
  </body>
</html>

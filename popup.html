<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>popup</title>
    <style>
      body {
        width: 250px;
        height: 300px;
        background-color: white;
        border-radius: 20px;
      }
      h1 {
        text-align: center;
      }
      input {
        display: block;
        margin: 10px auto;
        padding: 10px;
        border-radius: 5px;
        border: 1px solid #ccc;
        width: 200px;
      }
      button {
        display: block;
        margin: 10px auto;
        padding: 10px;
        border-radius: 5px;
        border: none;
        background-color: #4caf50;
        color: white;
        cursor: pointer;
      }
      button:hover {
        background-color: #45a049;
      }

      #container {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>osnTogether</h1>
      <input type="text" placeholder="Name" id="name" />
      <button id="button">join</button>
      <script src="popup.js"></script>
    </div>
  </body>
</html>
